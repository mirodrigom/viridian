<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Viridian — a full-featured web UI for Claude Code with chat, editor, git, task management, graph workflows, and autopilot." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="preload" as="image" type="image/webp" href="/icons/logo-192.webp" />
    <title>Viridian</title>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Inline loading skeleton — removed once Vue mounts */
      .app-skeleton {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #0a0a0a;
        color: #a1a1aa;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .app-skeleton-bar {
        height: 44px;
        background: #18181b;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
      }
      .app-skeleton-dot {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        background: #10b981;
        opacity: 0.6;
      }
      .app-skeleton-text {
        width: 64px;
        height: 14px;
        border-radius: 4px;
        background: #27272a;
      }
      .app-skeleton-tabs {
        height: 40px;
        background: #0f0f12;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        padding: 0 6px;
        gap: 4px;
      }
      .app-skeleton-tab {
        width: 72px;
        height: 28px;
        border-radius: 6px;
        background: #18181b;
      }
      .app-skeleton-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app-skeleton-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #27272a;
        border-top-color: #10b981;
        border-radius: 50%;
        animation: sk-spin 0.8s linear infinite;
      }
      @keyframes sk-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Inline loading skeleton — auto-replaced when Vue mounts -->
      <div class="app-skeleton" role="status" aria-label="Loading Viridian">
        <div class="app-skeleton-bar">
          <div class="app-skeleton-dot"></div>
          <div class="app-skeleton-text"></div>
        </div>
        <div class="app-skeleton-tabs">
          <div class="app-skeleton-tab"></div>
          <div class="app-skeleton-tab"></div>
          <div class="app-skeleton-tab"></div>
        </div>
        <div class="app-skeleton-body">
          <div class="app-skeleton-spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          navigator.serviceWorker.getRegistrations().then((regs) =>
            regs.forEach((r) => r.unregister())
          );
        } else {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
      }
    </script>
  </body>
</html>
